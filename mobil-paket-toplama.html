<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PeaksFood — Paket Toplama</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0f0d;--surface:#111a15;--surface2:#162019;--border:#1e2e23;
    --accent:#2dff7a;--accent-dark:#1a9947;
    --text:#e8f0ea;--text-muted:#6b8a72;--text-dim:#3d5442;
    --warning:#ffb84d;--danger:#ff5555;
    --font:'Poppins',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;}
  .hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
  .hdr-left{display:flex;flex-direction:column;}
  .hdr-name{font-size:13px;font-weight:700;}
  .hdr-sub{font-size:11px;color:var(--accent);font-weight:600;text-transform:uppercase;}
  .logo{font-size:15px;font-weight:900;color:var(--accent);}
  .asama-bar{display:flex;background:var(--surface2);border-bottom:1px solid var(--border);padding:7px 14px;gap:4px;}
  .as{flex:1;text-align:center;font-size:10px;font-weight:700;color:var(--text-dim);padding:5px 2px;border-radius:6px;text-transform:uppercase;}
  .as.aktif{background:rgba(255,184,77,0.12);color:var(--accent);}
  .as.tamam{color:var(--accent-dark);}
  .wrap{padding:14px 14px 40px;}
  .git-banner{background:var(--surface);border:2px solid var(--accent);border-radius:16px;padding:14px 12px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .git-ikon{font-size:26px;flex-shrink:0;}
  .git-orta{text-align:center;flex:1;padding:0 8px;}
  .git-label{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;}
  .git-kod{font-size:34px;font-weight:900;color:var(--accent);letter-spacing:2px;line-height:1;}
  .sayac-btn{background:var(--accent);color:#0a0f0d;border:none;border-radius:12px;padding:10px 14px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;min-width:64px;transition:all 0.15s;-webkit-user-select:none;user-select:none;}
  .sayac-btn:active{transform:scale(0.93);}
  .sayac-rakam{font-size:20px;font-weight:900;line-height:1;}
  .sayac-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;opacity:0.7;}
  .barkod-row{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:11px 14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
  .barkod-row-label{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;}
  .barkod-row-deger{font-size:16px;font-weight:800;font-family:monospace;letter-spacing:1px;}
  .inp-wrap{background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:13px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;transition:border-color 0.2s;}
  .inp-wrap:focus-within{border-color:var(--accent);}
  .inp-wrap svg{width:18px;height:18px;color:var(--text-muted);flex-shrink:0;}
  .inp{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:var(--font);font-size:16px;font-weight:600;}
  .inp::placeholder{color:var(--text-dim);font-weight:400;}
  .inp-msg{font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px;white-space:nowrap;display:none;}
  .inp-msg.ok{display:inline-block;background:rgba(45,255,122,0.15);color:var(--accent);}
  .inp-msg.err{display:inline-block;background:rgba(255,85,85,0.12);color:var(--danger);}
  .urun-ad{font-size:17px;font-weight:900;text-transform:uppercase;text-align:center;padding:12px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:12px;}
  .tablo{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
  .tablo-hdr{display:grid;grid-template-columns:2.5fr 1fr 1fr;padding:9px 14px;background:var(--surface2);border-bottom:1px solid var(--border);}
  .tablo-hdr span{font-size:10px;font-weight:800;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;}
  .tablo-hdr span:nth-child(2),.tablo-hdr span:last-child{text-align:center;}
  .tablo-satir{display:grid;grid-template-columns:2.5fr 1fr 1fr;padding:10px 14px;border-bottom:1px solid var(--border);align-items:center;}
  .tablo-satir:last-child{border:none;}
  .tablo-satir.aktif{background:rgba(255,184,77,0.05);}
  .tablo-satir span{font-size:12px;font-weight:500;}
  .tablo-satir span:first-child{font-family:monospace;font-size:11px;color:var(--text-muted);}
  .tablo-satir span:nth-child(2),.tablo-satir span:last-child{text-align:center;font-weight:700;}
  .b-ok{background:rgba(45,255,122,0.1);color:var(--accent-dark);border-radius:5px;padding:2px 8px;font-size:11px;font-weight:700;display:inline-block;}
  .b-sirada{background:rgba(45,255,122,0.15);color:var(--accent);border-radius:5px;padding:2px 8px;font-size:11px;font-weight:700;display:inline-block;}
  .tamam-ekran{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;text-align:center;padding:28px;}
  .tamam-ekran.show{display:flex;}
  .t-icon{width:90px;height:90px;border-radius:50%;background:rgba(255,184,77,0.1);border:3px solid var(--accent);display:flex;align-items:center;justify-content:center;margin-bottom:20px;animation:pulse 2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,184,77,0.4)}50%{box-shadow:0 0 0 18px rgba(255,184,77,0)}}
  .t-icon svg{width:46px;height:46px;color:var(--accent);}
  .t-tit{font-size:24px;font-weight:900;margin-bottom:8px;}
  .t-desc{font-size:14px;color:var(--text-muted);line-height:1.7;margin-bottom:24px;}
  .btn-devam{width:100%;max-width:320px;padding:20px;border:none;border-radius:16px;background:var(--accent);color:#0a0f0d;font-family:var(--font);font-size:17px;font-weight:900;cursor:pointer;text-transform:uppercase;}
  .loading{text-align:center;padding:40px;color:var(--text-muted);font-size:14px;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-name" id="hdrName">Personel</div>
    <div class="hdr-sub">📦 Paket Toplama</div>
  </div>
  <div class="logo">PEAKSFOOD</div>
</div>

<div class="asama-bar">
  <div class="as tamam">📦 Paket ✓</div>
  <div class="as aktif">📦 Paket</div>
  <div class="as">🖨️ Etiket</div>
  <div class="as">▶ Başlat</div>
</div>

<div class="wrap" id="mainWrap">
  <div class="loading">Raflar yükleniyor...</div>
</div>

<div class="tamam-ekran" id="tamamEkran">
  <div class="t-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <div class="t-tit">Paket Tamam! 📦</div>
  <div class="t-desc">Paket rafları tamamlandı.<br>Şimdi bilgisayara gidip etiket çıkar.</div>
  <button class="btn-devam" onclick="window.location.href='web-etiket.html'">
    Bilgisayarda Etiket Çıkar →
  </button>
</div>

<script>
const SB = 'https://ubnsszlwyhlmpoukfihw.supabase.co';
const KEY = 'sb_publishable_rbA-g8mway8Bp9pJtk6Jqw_0fFt3bp2';
const usr = localStorage.getItem('user') ? JSON.parse(localStorage.getItem('user')) : {id:'demo', ad:'Test Personel'};

document.getElementById('hdrName').textContent = usr.ad;

let raflar = [];
let idx = 0;
let bTimer;
let sayac = 0;

async function raflarYukle() {
  const uid = localStorage.getItem('aktif_uretim_id');
  try {
    // 1. Üretim kaydını çek
    if (uid && uid !== 'demo') {
      const r1 = await fetch(`${SB}/rest/v1/uretim?id=eq.${uid}&select=*`, {headers: {'apikey':KEY,'Authorization':`Bearer ${KEY}`}});
      const d1 = await r1.json();
      const uretim = d1 && d1[0] ? d1[0] : null;

      // 2. Reçeteden paket bilgisini çek
      if (uretim && uretim.recete_id) {
        const r2 = await fetch(`${SB}/rest/v1/recete?id=eq.${uretim.recete_id}&select=*`, {headers: {'apikey':KEY,'Authorization':`Bearer ${KEY}`}});
        const d2 = await r2.json();
        const recete = d2 && d2[0] ? d2[0] : null;

        if (recete && recete.paket_id) {
          // 3. Paketin bilgilerini çek
          const r3 = await fetch(`${SB}/rest/v1/paket?id=eq.${recete.paket_id}&select=*`, {headers: {'apikey':KEY,'Authorization':`Bearer ${KEY}`}});
          const d3 = await r3.json();
          const paket = d3 && d3[0] ? d3[0] : null;

          if (paket && paket.raf_id) {
            // 4. Paketin rafını çek
            const r4 = await fetch(`${SB}/rest/v1/raf?id=eq.${paket.raf_id}&select=*`, {headers: {'apikey':KEY,'Authorization':`Bearer ${KEY}`}});
            const d4 = await r4.json();
            const raf = d4 && d4[0] ? d4[0] : null;

            if (raf) {
              raflar = [{
                id: raf.id,
                kod: raf.raf_kodu,
                barkod: raf.barkod || ('RAF-' + raf.raf_kodu),
                ad: (paket.ad || paket.paket_kodu) + ' — RAF: ' + raf.raf_kodu,
                paketAd: paket.ad || paket.paket_kodu,
                paketAdet: uretim.planlanan_adet || 0
              }];
              render();
              return;
            }
          }
        }
      }
    }

    // Fallback: tüm paket raflarını göster
    const r = await fetch(`${SB}/rest/v1/raf?raf_tipi=eq.paket&select=*&order=sira.asc`, {headers: {'apikey':KEY,'Authorization':`Bearer ${KEY}`}});
    const d = await r.json();
    if (d && d.length > 0) {
      raflar = d.map(x => ({id:x.id, kod:x.raf_kodu, barkod:x.barkod||('RAF-'+x.raf_kodu), ad:'PAKET RAFI '+x.raf_kodu}));
    } else {
      raflar = [
        {id:'p1', kod:'B1', barkod:'RAF-B1', ad:'PAKET RAFI B1'},
        {id:'p2', kod:'B2', barkod:'RAF-B2', ad:'PAKET RAFI B2'},
      ];
    }
  } catch(e) {
    raflar = [
      {id:'p1', kod:'B1', barkod:'RAF-B1', ad:'PAKET RAFI B1'},
      {id:'p2', kod:'B2', barkod:'RAF-B2', ad:'PAKET RAFI B2'},
    ];
  }
  render();
}

function render() {
  const wrap = document.getElementById('mainWrap');
  if (idx >= raflar.length) { tamamla(); return; }
  sayac = 0;
  const r = raflar[idx];
  const toplam = raflar.length;
  const paketBilgi = r.paketAd ? `<div style="background:rgba(45,255,122,0.08);border:1px solid rgba(45,255,122,0.2);border-radius:10px;padding:10px 14px;margin-bottom:10px;font-size:13px"><b style="color:var(--accent)">${r.paketAd}</b><span style="color:var(--text-muted);margin-left:8px">${r.paketAdet} adet kullanılacak</span></div>` : '';

  wrap.innerHTML = `
    ${paketBilgi}
    <div class="git-banner">
      <div class="git-ikon">🚶</div>
      <div class="git-orta">
        <div class="git-label">Şuraya Git</div>
        <div class="git-kod">${r.kod}</div>
      </div>
      <button class="sayac-btn" onclick="manuelTopla()">
        <div class="sayac-rakam" id="sayacRakam">${sayac}</div>
        <div class="sayac-label">Adet</div>
      </button>
    </div>
    <div class="barkod-row">
      <div class="barkod-row-label">Barkod</div>
      <div class="barkod-row-deger">${r.barkod}</div>
    </div>
    <div class="inp-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="1" y="4" width="4" height="16"/><rect x="7" y="4" width="2" height="16"/>
        <rect x="11" y="4" width="4" height="16"/><rect x="17" y="4" width="2" height="16"/>
        <rect x="21" y="4" width="2" height="16"/>
      </svg>
      <input class="inp" id="barkodInp" placeholder="Barkod Numarası Giriniz!" autocomplete="off" autofocus oninput="barkodOku(this.value)"/>
      <span class="inp-msg" id="barkodMsg"></span>
    </div>
    <div class="urun-ad">${r.ad}</div>
    <div class="tablo">
      <div class="tablo-hdr"><span>Barkod</span><span>Raf</span><span>Durum</span></div>
      <div>${raflar.map((x,i) => `
        <div class="tablo-satir ${i===idx?'aktif':''}">
          <span>${x.barkod}</span>
          <span>${x.kod}</span>
          <span>${i<idx?'<span class="b-ok">✓ Tamam</span>':i===idx?'<span class="b-sirada">Sırada</span>':'—'}</span>
        </div>`).join('')}
      </div>
    </div>`;

  setTimeout(() => { const inp = document.getElementById('barkodInp'); if(inp) inp.focus(); }, 100);
}

function barkodOku(val) {
  clearTimeout(bTimer);
  bTimer = setTimeout(() => {
    const v = val.trim().toUpperCase();
    if (!v || idx >= raflar.length) return;
    const inp = document.getElementById('barkodInp');
    const msg = document.getElementById('barkodMsg');
    const hedef = raflar[idx].barkod.toUpperCase();
    if (v === hedef) {
      // Raf barkodu - raf tamamlandı geç
      msg.textContent = raflar[idx].kod + ' Tamam'; msg.className = 'inp-msg ok';
      inp.value = '';
      setTimeout(() => { msg.className = 'inp-msg'; topla(); }, 400);
    } else {
      // Ürün barkodu - sayaç artır
      sayac++;
      guncelleSayac();
      msg.textContent = sayac + ' adet'; msg.className = 'inp-msg ok';
      inp.value = '';
      setTimeout(() => { msg.className = 'inp-msg'; inp.focus(); }, 500);
    }
  }, 60);
}

function manuelTopla() { sayac++; guncelleSayac(); }
function guncelleSayac() {
  const el = document.getElementById('barkodSayac');
  if (el) el.textContent = sayac + ' adet';
  // Sayac butonunu da güncelle
  const btn = document.querySelector('.sayac-btn .sayac-rakam');
  if (btn) btn.textContent = sayac;
}
function topla() { idx++; render(); }
function tamamla() { document.getElementById('mainWrap').style.display='none'; document.getElementById('tamamEkran').classList.add('show'); }

raflarYukle();
</script>
</body>
</html>
