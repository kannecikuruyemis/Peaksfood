<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PeaksFood — Görevlerim</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0f0d;--surface:#111a15;--surface2:#162019;--border:#1e2e23;--accent:#2dff7a;--accent-dim:#1a9947;--accent-glow:rgba(45,255,122,0.12);--text:#e8f0ea;--text-muted:#6b8a72;--text-dim:#3d5442;--warning:#ffb84d;--danger:#ff4d4d;--info:#4d9fff;--font:'Poppins',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:48px 48px;opacity:0.3;pointer-events:none;z-index:0;}
.header{position:sticky;top:0;z-index:100;background:rgba(10,15,13,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-weight:900;font-size:16px;color:var(--accent);}
.header-right{display:flex;align-items:center;gap:10px;}
.user-badge{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:13px;color:var(--text-muted);}
.dot{width:8px;height:8px;background:var(--accent);border-radius:50%;animation:blink 2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.logout-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--text-muted);font-family:var(--font);font-size:13px;cursor:pointer;}
.logout-btn:hover{border-color:var(--danger);color:var(--danger);}
.main{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:28px 20px;}
.welcome{margin-bottom:24px;}
.welcome h1{font-size:24px;font-weight:800;margin-bottom:5px;}
.welcome h1 span{color:var(--accent);}
.welcome p{font-size:13px;color:var(--text-muted);}
.summary-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;position:relative;overflow:hidden;}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.sc.b::before{background:var(--warning);}
.sc.i::before{background:var(--info);}
.sc.t::before{background:var(--accent);}
.sc .num{font-size:30px;font-weight:800;margin-bottom:3px;}
.sc.b .num{color:var(--warning);}
.sc.i .num{color:var(--info);}
.sc.t .num{color:var(--accent);}
.sc .lbl{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;}
.section-title{font-size:15px;font-weight:700;margin-bottom:12px;}
.task-list{display:flex;flex-direction:column;gap:10px;}
.task-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px;display:flex;align-items:center;gap:14px;position:relative;overflow:hidden;}
.task-card .sb{position:absolute;left:0;top:0;bottom:0;width:3px;}
.task-card.bekliyor .sb{background:var(--warning);}
.task-card.devam .sb{background:var(--info);}
.task-card.tamamlandi .sb{background:var(--accent);}
.task-card.iptal .sb{background:var(--danger);}
.task-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px;}
.task-card.bekliyor .task-icon{background:rgba(255,184,77,0.1);}
.task-card.devam .task-icon{background:rgba(77,159,255,0.1);}
.task-card.tamamlandi .task-icon{background:var(--accent-glow);}
.task-card.iptal .task-icon{background:rgba(255,77,77,0.1);}
.task-info{flex:1;min-width:0;}
.task-name{font-size:14px;font-weight:700;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.task-meta{font-size:12px;color:var(--text-muted);}
.task-right{display:flex;flex-direction:column;align-items:flex-end;gap:7px;flex-shrink:0;}
.status-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:6px;text-transform:uppercase;}
.status-badge.bekliyor{background:rgba(255,184,77,0.1);color:var(--warning);}
.status-badge.devam{background:rgba(77,159,255,0.1);color:var(--info);}
.status-badge.tamamlandi{background:var(--accent-glow);color:var(--accent);}
.status-badge.iptal{background:rgba(255,77,77,0.1);color:var(--danger);}
.action-btn{background:var(--accent);color:#0a0f0d;border:none;border-radius:8px;padding:9px 16px;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;}
.action-btn:hover{box-shadow:0 4px 12px rgba(45,255,122,0.3);}
.action-btn.disabled{background:var(--surface2);color:var(--text-dim);cursor:default;box-shadow:none;}
.action-btn.reset{background:rgba(255,184,77,0.1);color:var(--warning);border:1px solid rgba(255,184,77,0.3);font-size:11px;padding:6px 12px;}
.loading{text-align:center;padding:50px;color:var(--text-muted);font-size:14px;}
.empty{text-align:center;padding:50px 20px;}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:0.5;}
.empty-text{font-size:14px;font-weight:600;color:var(--text-muted);}
.empty-sub{font-size:12px;color:var(--text-dim);margin-top:4px;}
</style>
</head>
<body>
<header class="header">
  <div class="logo">PEAKSFOOD</div>
  <div class="header-right">
    <div class="user-badge"><div class="dot"></div><span id="userName">...</span></div>
    <button class="logout-btn" onclick="cikisYap()">Çıkış</button>
  </div>
</header>
<main class="main">
  <div class="welcome">
    <h1>Merhaba, <span id="welcomeName">...</span> 👋</h1>
    <p id="tarihText"></p>
  </div>
  <div class="summary-row">
    <div class="sc b"><div class="num" id="bSayi">0</div><div class="lbl">Bekleyen</div></div>
    <div class="sc i"><div class="num" id="iSayi">0</div><div class="lbl">Devam Eden</div></div>
    <div class="sc t"><div class="num" id="tSayi">0</div><div class="lbl">Tamamlanan</div></div>
  </div>
  <div class="section-title">Üretim Görevleri</div>
  <div class="task-list" id="taskList"><div class="loading">Yükleniyor...</div></div>
</main>
<script>
const SB='https://ubnsszlwyhlmpoukfihw.supabase.co';
const KEY='sb_publishable_rbA-g8mway8Bp9pJtk6Jqw_0fFt3bp2';
const H={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json'};

// Oturum kontrolü
const userStr=localStorage.getItem('user');
if(!userStr){window.location.href='personel-giris.html';}
const user=JSON.parse(userStr);

document.getElementById('userName').textContent=user.ad;
document.getElementById('welcomeName').textContent=(user.ad||'').split(' ')[0];

const gunler=['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
const aylar=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
const s=new Date();
document.getElementById('tarihText').textContent=gunler[s.getDay()]+', '+s.getDate()+' '+aylar[s.getMonth()]+' '+s.getFullYear()+' — Bugünkü görevlerin aşağıda listeleniyor.';

function cikisYap(){
  localStorage.removeItem('user');
  localStorage.removeItem('aktif_uretim_id');
  window.location.href='personel-giris.html';
}

async function yukle(){
  const list=document.getElementById('taskList');
  try{
    // Personel ID ile üretimleri çek, v_uretim view'ından sku de gelir
    const r=await fetch(
      `${SB}/rest/v1/uretim?personel_id=eq.${user.id}&order=olusturma_tarihi.desc&select=*`,
      {headers:H}
    );
    const d=await r.json();
    if(!Array.isArray(d)||d.length===0){
      document.getElementById('bSayi').textContent='0';
      document.getElementById('iSayi').textContent='0';
      document.getElementById('tSayi').textContent='0';
      list.innerHTML='<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Henüz atanmış görev yok</div><div class="empty-sub">Admin tarafından görev atandığında burada görünecek</div></div>';
      return;
    }
    document.getElementById('bSayi').textContent=d.filter(x=>x.durum==='bekliyor').length;
    document.getElementById('iSayi').textContent=d.filter(x=>x.durum==='devam').length;
    document.getElementById('tSayi').textContent=d.filter(x=>x.durum==='tamamlandi').length;
    goster(d);
  }catch(e){
    list.innerHTML='<div class="loading">Hata: '+e.message+'</div>';
  }
}

function goster(d){
  const list=document.getElementById('taskList');
  const durumMap={
    bekliyor:{icon:'📦',tr:'Bekliyor',cls:'bekliyor'},
    devam:{icon:'⚙️',tr:'Devam Ediyor',cls:'devam'},
    tamamlandi:{icon:'✅',tr:'Tamamlandı',cls:'tamamlandi'},
    iptal:{icon:'❌',tr:'İptal',cls:'iptal'}
  };
  list.innerHTML=d.map(g=>{
    const durum=g.durum||'bekliyor';
    const dm=durumMap[durum]||durumMap.bekliyor;
    const tarih=g.uretim_tarihi?new Date(g.uretim_tarihi).toLocaleDateString('tr-TR'):(g.olusturma_tarihi?new Date(g.olusturma_tarihi).toLocaleDateString('tr-TR'):'—');
    const tett=g.tett?new Date(g.tett).toLocaleDateString('tr-TR'):'—';
    const vardiya=g.vardiya==='sabah'?'☀️ Sabah':'🌙 Akşam';

    let butonHtml='';
    if(durum==='bekliyor'){
      butonHtml=`<button class="action-btn" onclick="gorev('${g.id}','bekliyor')">Başlat →</button>`;
    } else if(durum==='devam'){
      butonHtml=`<button class="action-btn" onclick="gorev('${g.id}','devam')">Devam Et →</button>`;
    } else if(durum==='tamamlandi'){
      butonHtml=`<button class="action-btn disabled">Tamamlandı</button>
      <button class="action-btn reset" onclick="sifirla('${g.id}')">🔄 Test Sıfırla</button>`;
    } else {
      butonHtml=`<button class="action-btn disabled">İptal Edildi</button>`;
    }

    return `<div class="task-card ${dm.cls}">
      <div class="sb"></div>
      <div class="task-icon">${dm.icon}</div>
      <div class="task-info">
        <div class="task-name">${g.urun_adi||'Üretim Görevi'}</div>
        <div class="task-meta">${tarih} &nbsp;·&nbsp; ${g.planlanan_adet||0} adet &nbsp;·&nbsp; ${vardiya} &nbsp;·&nbsp; TETT: ${tett}</div>
        ${g.personel_notu?`<div style="margin-top:5px;font-size:11px;background:rgba(245,158,11,0.1);border-radius:6px;padding:4px 8px;color:#f59e0b">📌 ${g.personel_notu}</div>`:''}
      </div>
      <div class="task-right">
        <span class="status-badge ${dm.cls}">${dm.tr}</span>
        ${butonHtml}
      </div>
    </div>`;
  }).join('');
}

function gorev(id, durum){
  localStorage.setItem('aktif_uretim_id', id);
  // Akış: bekliyor → paket toplama | devam → paket toplama (kaldığı yerden)
  window.location.href='mobil-paket-toplama.html';
}

async function sifirla(id){
  if(!confirm('Bu görevi sıfırlamak istediğinize emin misiniz?'))return;
  try{
    await fetch(SB+'/rest/v1/uretim?id=eq.'+id,{
      method:'PATCH',
      headers:{...H,'Prefer':'return=minimal'},
      body:JSON.stringify({
        durum:'bekliyor',
        uretilen_adet:0,
        fire_adet:0,
        paket_tamam:false,
        etiket_tamam:false,
        hammadde_tamam:false,
        notlar:null,
        baslama_tarihi:null,
        bitis_tarihi:null,
        sentos_gonderildi:false
      })
    });
    yukle();
  }catch(e){alert('Hata: '+e.message);}
}

yukle();
</script>
</body>
</html>
