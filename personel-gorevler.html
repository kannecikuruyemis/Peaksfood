<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PeaksFood — Görevlerim</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0f0d;--surface:#111a15;--surface2:#162019;--border:#1e2e23;
    --accent:#2dff7a;--accent-dim:#1a9947;--accent-glow:rgba(45,255,122,0.12);
    --text:#e8f0ea;--text-muted:#6b8a72;--text-dim:#3d5442;
    --warning:#ffb84d;--danger:#ff4d4d;--info:#4d9fff;
    --font:'Poppins',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:48px 48px;opacity:0.3;pointer-events:none;z-index:0;}
  .header{position:sticky;top:0;z-index:100;background:rgba(10,15,13,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;}
  .header-left{display:flex;align-items:center;gap:12px;}
  .logo{font-family:var(--font);font-weight:900;font-size:16px;color:var(--accent);}
  .divider-v{width:1px;height:20px;background:var(--border);}
  .page-title{font-size:14px;color:var(--text-muted);}
  .header-right{display:flex;align-items:center;gap:12px;}
  .user-badge{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:13px;color:var(--text-muted);}
  .user-badge .dot{width:8px;height:8px;background:var(--accent);border-radius:50%;animation:blink 2s ease-in-out infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
  .logout-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--text-muted);font-family:var(--font);font-size:13px;cursor:pointer;transition:all 0.2s;}
  .logout-btn:hover{border-color:var(--danger);color:var(--danger);}
  .main{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:32px 24px;}
  .welcome{margin-bottom:32px;animation:fadeUp 0.5s ease forwards;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .welcome h1{font-family:var(--font);font-size:26px;font-weight:800;color:var(--text);margin-bottom:6px;}
  .welcome h1 span{color:var(--accent);}
  .welcome p{font-size:14px;color:var(--text-muted);}
  .summary-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:32px;animation:fadeUp 0.5s ease 0.1s both forwards;opacity:0;}
  .summary-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;position:relative;overflow:hidden;}
  .summary-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
  .summary-card.bekliyor::before{background:var(--warning);}
  .summary-card.islemde::before{background:var(--info);}
  .summary-card.tamamlandi::before{background:var(--accent);}
  .summary-card .num{font-family:var(--font);font-size:32px;font-weight:800;margin-bottom:4px;}
  .summary-card.bekliyor .num{color:var(--warning);}
  .summary-card.islemde .num{color:var(--info);}
  .summary-card.tamamlandi .num{color:var(--accent);}
  .summary-card .label{font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;font-weight:500;}
  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;animation:fadeUp 0.5s ease 0.2s both forwards;opacity:0;}
  .section-title{font-family:var(--font);font-size:16px;font-weight:700;color:var(--text);}
  .filter-row{display:flex;gap:8px;}
  .filter-btn{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 14px;color:var(--text-muted);font-family:var(--font);font-size:12px;cursor:pointer;transition:all 0.2s;font-weight:500;}
  .filter-btn.active,.filter-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow);}
  .task-list{display:flex;flex-direction:column;gap:10px;animation:fadeUp 0.5s ease 0.3s both forwards;opacity:0;}
  .task-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:border-color 0.2s,transform 0.15s;position:relative;overflow:hidden;}
  .task-card:hover{border-color:rgba(45,255,122,0.3);transform:translateX(4px);}
  .task-card .status-bar{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:14px 0 0 14px;}
  .task-card.bekliyor .status-bar{background:var(--warning);}
  .task-card.islemde .status-bar{background:var(--info);}
  .task-card.tamamlandi .status-bar{background:var(--accent);}
  .task-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .task-card.bekliyor .task-icon{background:rgba(255,184,77,0.1);}
  .task-card.islemde .task-icon{background:rgba(77,159,255,0.1);}
  .task-card.tamamlandi .task-icon{background:var(--accent-glow);}
  .task-icon svg{width:20px;height:20px;}
  .task-card.bekliyor .task-icon svg{color:var(--warning);}
  .task-card.islemde .task-icon svg{color:var(--info);}
  .task-card.tamamlandi .task-icon svg{color:var(--accent);}
  .task-info{flex:1;min-width:0;}
  .task-name{font-family:var(--font);font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .task-meta{font-size:12px;color:var(--text-muted);display:flex;gap:12px;}
  .task-meta span{display:flex;align-items:center;gap:4px;}
  .task-meta svg{width:12px;height:12px;}
  .task-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0;}
  .status-badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px;text-transform:uppercase;letter-spacing:0.5px;}
  .status-badge.bekliyor{background:rgba(255,184,77,0.1);color:var(--warning);}
  .status-badge.islemde{background:rgba(77,159,255,0.1);color:var(--info);}
  .status-badge.tamamlandi{background:var(--accent-glow);color:var(--accent);}
  .action-btn{background:var(--accent);color:#0a0f0d;border:none;border-radius:8px;padding:8px 16px;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
  .action-btn:hover{box-shadow:0 4px 12px rgba(45,255,122,0.3);transform:translateY(-1px);}
  .action-btn.disabled{background:var(--surface2);color:var(--text-dim);cursor:default;box-shadow:none;transform:none;}
  .loading-state{text-align:center;padding:60px;color:var(--text-muted);font-size:14px;}
  .loading-spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<header class="header">
  <div class="header-left">
    <div class="logo">PEAKSFOOD</div>
    <div class="divider-v"></div>
    <div class="page-title">Görevlerim</div>
  </div>
  <div class="header-right">
    <div class="user-badge">
      <div class="dot"></div>
      <span id="userName">Yükleniyor...</span>
    </div>
    <button class="logout-btn" onclick="cikisYap()">Çıkış</button>
  </div>
</header>
<main class="main">
  <div class="welcome">
    <h1>Merhaba, <span id="welcomeName">...</span> 👋</h1>
    <p id="tarihText">Bugünkü görevlerin aşağıda listeleniyor.</p>
  </div>
  <div class="summary-row">
    <div class="summary-card bekliyor"><div class="num" id="bekleyenSayi">0</div><div class="label">Bekleyen</div></div>
    <div class="summary-card islemde"><div class="num" id="islemdeSayi">0</div><div class="label">İşlemde</div></div>
    <div class="summary-card tamamlandi"><div class="num" id="tamamlananSayi">0</div><div class="label">Tamamlanan</div></div>
  </div>
  <div class="section-header">
    <div class="section-title">Üretim Görevleri</div>
    <div class="filter-row">
      <button class="filter-btn active" onclick="filtrele('hepsi',this)">Hepsi</button>
      <button class="filter-btn" onclick="filtrele('bekliyor',this)">Bekleyen</button>
      <button class="filter-btn" onclick="filtrele('islemde',this)">İşlemde</button>
      <button class="filter-btn" onclick="filtrele('tamamlandi',this)">Tamamlanan</button>
    </div>
  </div>
  <div class="task-list" id="taskList">
    <div class="loading-state"><div class="loading-spinner"></div><p>Görevler yükleniyor...</p></div>
  </div>
</main>
<script>
const SB='https://coipnfyqvcoficmghevz.supabase.co';
const KEY='sb_publishable_2O_WIK7JH8_Jizyarw2MUA_PN7Eeyhi';
const userStr=localStorage.getItem('user');
const user=userStr?JSON.parse(userStr):{id:'demo',ad:'Test Personel',email:'personel',rol:'personel'};
let tumGorevler=[];
document.getElementById('userName').textContent=user.ad;
document.getElementById('welcomeName').textContent=user.ad.split(' ')[0];
const simdi=new Date();
const gunler=['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
const aylar=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
document.getElementById('tarihText').textContent=`${gunler[simdi.getDay()]}, ${simdi.getDate()} ${aylar[simdi.getMonth()]} ${simdi.getFullYear()} — Bugünkü görevlerin aşağıda listeleniyor.`;
async function gorevleriYukle(){
  try{
    const email=user.email||'personel';
    const kRes=await fetch(`${SB}/rest/v1/kullanici?email=eq.${encodeURIComponent(email)}&select=id`,{headers:{'apikey':KEY,'Authorization':`Bearer ${KEY}`}});
    const kData=await kRes.json();
    const pid=kData&&kData[0]?kData[0].id:user.id;
    const res=await fetch(`${SB}/rest/v1/uretim?personel_id=eq.${pid}&select=*,recete(ad,sku)&order=olusturma_tarihi.desc`,{headers:{'apikey':KEY,'Authorization':`Bearer ${KEY}`}});
    const data=await res.json();
    tumGorevler=data||[];
    sayilariGuncelle();
    goruntule(tumGorevler);
  }catch(e){tumGorevler=[];goruntule([]);}
}
function sayilariGuncelle(){
  document.getElementById('bekleyenSayi').textContent=tumGorevler.filter(g=>g.durum==='bekliyor').length;
  document.getElementById('islemdeSayi').textContent=tumGorevler.filter(g=>g.durum==='islemde').length;
  document.getElementById('tamamlananSayi').textContent=tumGorevler.filter(g=>g.durum==='tamamlandi').length;
}
function goruntule(gorevler){
  const list=document.getElementById('taskList');
  if(gorevler.length===0){
    list.innerHTML=`<div style="text-align:center;padding:60px 20px;color:var(--text-muted)"><svg style="width:48px;height:48px;color:var(--text-dim);margin-bottom:16px;display:block;margin-left:auto;margin-right:auto" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/></svg><p style="font-size:14px">Henüz görev atanmamış.</p><p style="font-size:12px;margin-top:6px;color:var(--text-dim)">Admin tarafından üretim planlandığında burada görünecek.</p></div>`;
    return;
  }
  list.innerHTML=gorevler.map(g=>{
    const ad=g.recete?g.recete.ad:'Üretim Görevi';
    const sku=g.recete?g.recete.sku:'';
    const tarih=new Date(g.olusturma_tarihi).toLocaleDateString('tr-TR');
    const butonText=g.durum==='bekliyor'?'Başlat':g.durum==='islemde'?'Devam Et':'Tamamlandı';
    const butonClass=g.durum==='tamamlandi'?'action-btn disabled':'action-btn';
    const onclick=g.durum==='tamamlandi'?'':`onclick="uretimeGit('${g.id}')"`;
    return `<div class="task-card ${g.durum}"><div class="status-bar"></div><div class="task-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div><div class="task-info"><div class="task-name">${ad}</div><div class="task-meta"><span>${tarih}</span><span>${g.planlanan_adet} adet</span>${sku?`<span>SKU: ${sku}</span>`:''}</div></div><div class="task-right"><span class="status-badge ${g.durum}">${g.durum==='bekliyor'?'Bekliyor':g.durum==='islemde'?'İşlemde':'Tamamlandı'}</span><button class="${butonClass}" ${onclick}>${butonText}</button></div></div>`;
  }).join('');
}
function filtrele(durum,btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  goruntule(durum==='hepsi'?tumGorevler:tumGorevler.filter(g=>g.durum===durum));
}
function uretimeGit(id){
  localStorage.setItem('aktif_uretim_id',id);
  window.location.href='mobil-paket-toplama.html';
}
function cikisYap(){localStorage.clear();window.location.href='personel-giris.html';}
gorevleriYukle();
</script>
</body>
</html>
