<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PeaksFood — Görevlerim</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0f0d;--surface:#111a15;--surface2:#162019;--border:#1e2e23;--accent:#2dff7a;--accent-dim:#1a9947;--accent-glow:rgba(45,255,122,0.12);--text:#e8f0ea;--text-muted:#6b8a72;--text-dim:#3d5442;--warning:#ffb84d;--danger:#ff4d4d;--info:#4d9fff;--font:'Poppins',sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:48px 48px;opacity:0.3;pointer-events:none;z-index:0;}
  .header{position:sticky;top:0;z-index:100;background:rgba(10,15,13,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;}
  .logo{font-weight:900;font-size:16px;color:var(--accent);}
  .header-right{display:flex;align-items:center;gap:12px;}
  .user-badge{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:13px;color:var(--text-muted);}
  .dot{width:8px;height:8px;background:var(--accent);border-radius:50%;animation:blink 2s ease-in-out infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
  .logout-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--text-muted);font-family:var(--font);font-size:13px;cursor:pointer;}
  .logout-btn:hover{border-color:var(--danger);color:var(--danger);}
  .main{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:32px 24px;}
  .welcome{margin-bottom:28px;}
  .welcome h1{font-size:26px;font-weight:800;margin-bottom:6px;}
  .welcome h1 span{color:var(--accent);}
  .welcome p{font-size:14px;color:var(--text-muted);}
  .summary-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px;}
  .sc{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;position:relative;overflow:hidden;}
  .sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
  .sc.b::before{background:var(--warning);}
  .sc.i::before{background:var(--info);}
  .sc.t::before{background:var(--accent);}
  .sc .num{font-size:32px;font-weight:800;margin-bottom:4px;}
  .sc.b .num{color:var(--warning);}
  .sc.i .num{color:var(--info);}
  .sc.t .num{color:var(--accent);}
  .sc .lbl{font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;}
  .section-title{font-size:16px;font-weight:700;margin-bottom:14px;}
  .task-list{display:flex;flex-direction:column;gap:10px;}
  .task-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;display:flex;align-items:center;gap:16px;position:relative;overflow:hidden;}
  .task-card .sb{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:14px 0 0 14px;}
  .task-card.bekliyor .sb{background:var(--warning);}
  .task-card.islemde .sb,.task-card.devam .sb{background:var(--info);}
  .task-card.tamamlandi .sb{background:var(--accent);}
  .task-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px;}
  .task-card.bekliyor .task-icon{background:rgba(255,184,77,0.1);}
  .task-card.islemde .task-icon,.task-card.devam .task-icon{background:rgba(77,159,255,0.1);}
  .task-card.tamamlandi .task-icon{background:var(--accent-glow);}
  .task-info{flex:1;min-width:0;}
  .task-name{font-size:15px;font-weight:700;margin-bottom:4px;}
  .task-meta{font-size:12px;color:var(--text-muted);}
  .task-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0;}
  .status-badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px;text-transform:uppercase;}
  .status-badge.bekliyor{background:rgba(255,184,77,0.1);color:var(--warning);}
  .status-badge.islemde,.status-badge.devam{background:rgba(77,159,255,0.1);color:var(--info);}
  .status-badge.tamamlandi{background:var(--accent-glow);color:var(--accent);}
  .action-btn{background:var(--accent);color:#0a0f0d;border:none;border-radius:8px;padding:10px 18px;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;}
  .action-btn:hover{box-shadow:0 4px 12px rgba(45,255,122,0.3);}
  .action-btn.disabled{background:var(--surface2);color:var(--text-dim);cursor:default;box-shadow:none;}
  .action-btn.reset{background:rgba(255,184,77,0.1);color:var(--warning);border:1px solid rgba(255,184,77,0.3);}
  .loading{text-align:center;padding:60px;color:var(--text-muted);font-size:14px;}
</style>
</head>
<body>
<header class="header">
  <div class="logo">PEAKSFOOD</div>
  <div class="header-right">
    <div class="user-badge"><div class="dot"></div><span id="userName">...</span></div>
    <button class="logout-btn" onclick="localStorage.clear();location.href='personel-giris.html'">Çıkış</button>
  </div>
</header>
<main class="main">
  <div class="welcome">
    <h1>Merhaba, <span id="welcomeName">...</span> 👋</h1>
    <p id="tarihText"></p>
  </div>
  <div class="summary-row">
    <div class="sc b"><div class="num" id="bSayi">0</div><div class="lbl">Bekleyen</div></div>
    <div class="sc i"><div class="num" id="iSayi">0</div><div class="lbl">İşlemde</div></div>
    <div class="sc t"><div class="num" id="tSayi">0</div><div class="lbl">Tamamlanan</div></div>
  </div>
  <div class="section-title">Üretim Görevleri</div>
  <div class="task-list" id="taskList"><div class="loading">Yükleniyor...</div></div>
</main>
<script>
const SB='https://ubnsszlwyhlmpoukfihw.supabase.co';
const KEY='sb_publishable_rbA-g8mway8Bp9pJtk6Jqw_0fFt3bp2';
const h={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json'};
const userStr=localStorage.getItem('user');
const user=userStr?JSON.parse(userStr):{id:'',ad:'Test Personel',email:'personel'};
document.getElementById('userName').textContent=user.ad||'Personel';
document.getElementById('welcomeName').textContent=(user.ad||'Personel').split(' ')[0];
const s=new Date();
const g=['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
const a=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
document.getElementById('tarihText').textContent=g[s.getDay()]+', '+s.getDate()+' '+a[s.getMonth()]+' '+s.getFullYear()+' — Bugünkü görevlerin aşağıda listeleniyor.';

async function yukle(){
  try{
    const pid=user.id;
    if(!pid){document.getElementById('taskList').innerHTML='<div class="loading">Oturum bulunamadı. <a href="personel-giris.html">Tekrar giriş yap</a></div>';return;}
    const r=await fetch(SB+'/rest/v1/uretim?personel_id=eq.'+pid+'&select=*&order=olusturma_tarihi.desc',{headers:h});
    const d=await r.json();
    if(!d||d.length===0){
      document.getElementById('bSayi').textContent=0;
      document.getElementById('iSayi').textContent=0;
      document.getElementById('tSayi').textContent=0;
      document.getElementById('taskList').innerHTML='<div class="loading">Henüz atanmış görev yok.</div>';
      return;
    }
    goster(d);
  }catch(e){
    document.getElementById('taskList').innerHTML='<div class="loading">Hata: '+e.message+'</div>';
  }
}

function goster(d){
  document.getElementById('bSayi').textContent=d.filter(x=>x.durum==='bekliyor').length;
  document.getElementById('iSayi').textContent=d.filter(x=>x.durum==='devam').length;
  document.getElementById('tSayi').textContent=d.filter(x=>x.durum==='tamamlandi').length;
  const list=document.getElementById('taskList');
  if(!d||d.length===0){list.innerHTML='<div class="loading">Henüz görev yok.</div>';return;}
  list.innerHTML=d.map(g=>{
    const tarih=g.olusturma_tarihi?new Date(g.olusturma_tarihi).toLocaleDateString('tr-TR'):'—';
    const durum=g.durum||'bekliyor';
    const icon=durum==='bekliyor'?'📦':durum==='devam'?'⚙️':'✅';
    const durumTr=durum==='bekliyor'?'Bekliyor':durum==='devam'?'Devam':'Tamamlandı';
    const butonText=durum==='bekliyor'?'Başlat →':durum==='devam'?'Devam Et →':'Tamamlandı';
    const butonClass=durum==='tamamlandi'?'action-btn disabled':'action-btn';
    const onclick=durum==='tamamlandi'?'':`onclick="git('${g.id}','${durum}')"`;
    const resetBtn=durum==='tamamlandi'?`<button class="action-btn reset" onclick="sifirla('${g.id}')">🔄 Test Sıfırla</button>`:'';
    return `<div class="task-card ${durum}"><div class="sb"></div><div class="task-icon">${icon}</div><div class="task-info"><div class="task-name">Üretim Görevi</div><div class="task-meta">${tarih} &nbsp;·&nbsp; ${g.planlanan_adet} adet</div></div><div class="task-right"><span class="status-badge ${durum}">${durumTr}</span><button class="${butonClass}" ${onclick}>${butonText}</button>${resetBtn}</div></div>`;
  }).join('');
}

function git(id,durum){
  localStorage.setItem('aktif_uretim_id',id);
  if(durum==='devam') location.href='mobil-hammadde-toplama.html';
  else location.href='mobil-paket-toplama.html';
}

async function sifirla(id){
  await fetch(SB+'/rest/v1/uretim?id=eq.'+id,{method:'PATCH',headers:{...h,'Prefer':'return=minimal'},body:JSON.stringify({durum:'bekliyor',uretilen_adet:null,toplam_gramaj:null,fire_gramaj:0,notlar:null,baslama_tarihi:null,bitis_tarihi:null})});
  yukle();
}

yukle();
</script>
</body>
</html>
