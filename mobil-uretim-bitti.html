<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PeaksFood — Üretim Bitti</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0f0d;--surface:#111a15;--surface2:#162019;--border:#1e2e23;
    --accent:#2dff7a;--accent-dark:#1a9947;--accent-glow:rgba(45,255,122,0.12);
    --text:#e8f0ea;--text-muted:#6b8a72;--text-dim:#3d5442;
    --warning:#ffb84d;--info:#4d9fff;--danger:#ff5555;
    --font:'Poppins',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;}

  .hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
  .hdr-left{display:flex;flex-direction:column;}
  .hdr-name{font-size:13px;font-weight:700;}
  .hdr-sub{font-size:11px;color:var(--accent);font-weight:600;text-transform:uppercase;}
  .logo{font-size:15px;font-weight:900;color:var(--accent);}

  .wrap{padding:14px 14px 48px;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  /* ÜRÜN KARTI */
  .urun-kart{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:16px;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden;}
  .urun-kart::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--info);}
  .uk-icon{width:42px;height:42px;border-radius:10px;background:rgba(77,159,255,0.1);border:1px solid rgba(77,159,255,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .uk-icon svg{width:20px;height:20px;color:var(--info);}
  .uk-info{flex:1;min-width:0;}
  .uk-ad{font-size:14px;font-weight:800;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .uk-meta{font-size:11px;color:var(--text-muted);font-weight:500;}
  .islemde-b{background:rgba(77,159,255,0.1);color:var(--info);border:1px solid rgba(77,159,255,0.2);border-radius:6px;padding:3px 10px;font-size:10px;font-weight:700;text-transform:uppercase;white-space:nowrap;flex-shrink:0;}

  /* BÖLÜM */
  .bolum{font-size:10px;font-weight:800;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;margin-top:4px;}

  /* GİRİŞ KARTI */
  .giris-kart{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px;}

  .alan{margin-bottom:14px;}
  .alan:last-child{margin-bottom:0;}
  .alan label{display:block;font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;}
  .inp-row{display:flex;gap:10px;align-items:stretch;}
  .inp-wrap{flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:14px;display:flex;align-items:center;gap:10px;transition:border-color 0.2s;}
  .inp-wrap:focus-within{border-color:var(--accent);}
  .inp-wrap input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:var(--font);font-size:24px;font-weight:800;-moz-appearance:textfield;width:100%;}
  .inp-wrap input::-webkit-outer-spin-button,.inp-wrap input::-webkit-inner-spin-button{-webkit-appearance:none;}
  .inp-wrap input::placeholder{color:var(--text-dim);font-weight:400;font-size:18px;}
  .inp-birim{font-size:14px;font-weight:700;color:var(--text-muted);flex-shrink:0;}
  .inp-not{font-size:11px;color:var(--text-dim);margin-top:5px;}

  /* TAMAMLANDI BUTONU */
  .btn-tamam{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:14px 16px;color:var(--text-dim);font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap;flex-shrink:0;transition:all 0.2s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;min-width:80px;}
  .btn-tamam svg{width:20px;height:20px;}
  .btn-tamam:active{transform:scale(0.94);}
  .btn-tamam.done{background:var(--accent);border-color:var(--accent);color:#0a0f0d;}
  .btn-tamam.done svg{stroke:#0a0f0d;}

  /* NOT */
  .not-kart{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:16px;}
  .not-kart label{display:block;font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;}
  textarea{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:var(--font);font-size:14px;resize:none;min-height:80px;outline:none;line-height:1.6;transition:border-color 0.2s;}
  textarea:focus{border-color:var(--accent);}
  textarea::placeholder{color:var(--text-dim);}

  /* BÜYÜK BUTON */
  .btn-bitir{width:100%;padding:22px;border:none;border-radius:16px;background:var(--accent);color:#0a0f0d;font-family:var(--font);font-size:20px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;text-transform:uppercase;letter-spacing:0.5px;-webkit-user-select:none;user-select:none;}
  .btn-bitir:active{transform:scale(0.97);}
  .btn-bitir:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
  .btn-bitir svg{width:22px;height:22px;}

  /* BAŞARI */
  .basari{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;text-align:center;padding:28px;}
  .basari.show{display:flex;}
  .b-icon{width:90px;height:90px;border-radius:50%;background:var(--accent-glow);border:3px solid var(--accent);display:flex;align-items:center;justify-content:center;margin-bottom:20px;animation:pulse 2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(45,255,122,0.4)}50%{box-shadow:0 0 0 18px rgba(45,255,122,0)}}
  .b-icon svg{width:46px;height:46px;color:var(--accent);}
  .b-tit{font-size:24px;font-weight:900;margin-bottom:8px;}
  .b-badge{display:inline-block;background:rgba(45,255,122,0.1);color:var(--accent);border:1px solid rgba(45,255,122,0.25);border-radius:10px;padding:6px 18px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:18px;}
  .b-ozet{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:22px;width:100%;text-align:left;}
  .b-oz-satir{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
  .b-oz-satir:last-child{border:none;padding-bottom:0;}
  .b-oz-satir .k{color:var(--text-muted);font-weight:500;}
  .b-oz-satir .v{font-weight:700;}
  .b-oz-satir .v.ok{color:var(--accent);}
  .b-oz-satir .v.uyari{color:var(--warning);}
  .btn-geri{width:100%;max-width:300px;padding:18px;border:none;border-radius:16px;background:var(--accent);color:#0a0f0d;font-family:var(--font);font-size:17px;font-weight:900;cursor:pointer;text-transform:uppercase;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-name" id="hdrName">Personel</div>
    <div class="hdr-sub">🏁 Üretim Bitti</div>
  </div>
  <div class="logo">PEAKSFOOD</div>
</div>

<div class="wrap" id="mainWrap">

  <!-- Ürün kartı -->
  <div class="urun-kart">
    <div class="uk-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
    </div>
    <div class="uk-info">
      <div class="uk-ad" id="urunAd">Yükleniyor...</div>
      <div class="uk-meta">Plan: <b id="planlanan">—</b> adet &nbsp;·&nbsp; SKU: <b id="sku">—</b></div>
    </div>
    <div class="islemde-b">İşlemde</div>
  </div>

  <!-- Üretim bilgileri -->
  <div class="bolum">Üretim Bilgileri</div>
  <div class="giris-kart">

    <div class="alan">
      <label>Üretilen Paket Adedi</label>
      <div class="inp-row">
        <div class="inp-wrap">
          <input type="number" id="paketAdet" placeholder="0" min="0" inputmode="numeric"/>
          <span class="inp-birim">adet</span>
        </div>
      </div>
    </div>

    <div class="alan">
      <label>Bir Paketin Gramajı</label>
      <div class="inp-row">
        <div class="inp-wrap">
          <input type="number" id="paketGram" placeholder="0" min="0" inputmode="numeric"/>
          <span class="inp-birim">gram</span>
        </div>
      </div>
      <div class="inp-not">Örn: 1 kg'lık paket için 1000</div>
    </div>

  </div>

  <!-- Açıkta kalanlar -->
  <div class="bolum">Açıkta Kalanlar</div>
  <div class="giris-kart">

    <div class="alan">
      <label>Açıkta Kalan Ürün</label>
      <div class="inp-row">
        <div class="inp-wrap">
          <input type="number" id="aciktaUrun" placeholder="0" min="0" inputmode="numeric"/>
          <span class="inp-birim">gram</span>
        </div>
        <button class="btn-tamam" id="btnUrun" onclick="tamam('urun')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
          Tamam
        </button>
      </div>
      <div class="inp-not">Doluma girmeyen açıkta kalan ürün</div>
    </div>

    <div class="alan">
      <label>Açıkta Kalan Paket</label>
      <div class="inp-row">
        <div class="inp-wrap">
          <input type="number" id="aciktaPaket" placeholder="0" min="0" inputmode="numeric"/>
          <span class="inp-birim">adet</span>
        </div>
        <button class="btn-tamam" id="btnPaket" onclick="tamam('paket')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
          Tamam
        </button>
      </div>
      <div class="inp-not">Tam dolmayan veya fazla paket adedi</div>
    </div>

  </div>

  <!-- Not -->
  <div class="not-kart">
    <label>Not (İsteğe Bağlı)</label>
    <textarea id="notInp" placeholder="Üretim sırasında bir sorun veya gözlem varsa buraya yazın..."></textarea>
  </div>

  <!-- Tamamla butonu -->
  <button class="btn-bitir" id="btnBitir" onclick="uretimiBitir()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
    ÜRETİMİ TAMAMLA
  </button>

</div>

<!-- Başarı -->
<div class="basari" id="basariEkran">
  <div class="b-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <div class="b-tit">Üretim Tamamlandı! 🎉</div>
  <div class="b-badge">Tamamlandı</div>
  <div class="b-ozet" id="basariOzet"></div>
  <button class="btn-geri" onclick="window.location.href='personel-gorevler.html'">GÖREVLERE DÖN</button>
</div>

<script>
const SB = 'https://ubnsszlwyhlmpoukfihw.supabase.co';
const KEY = 'sb_publishable_rbA-g8mway8Bp9pJtk6Jqw_0fFt3bp2';
const usr = localStorage.getItem('user') ? JSON.parse(localStorage.getItem('user')) : {id:'demo', ad:'Test Personel'};
const uid = localStorage.getItem('aktif_uretim_id') || 'demo';
let urun = {ad:'Test Ürünü', sku:'PKS-001', adet:50};
let urunTamam = false;
let paketTamam = false;

document.getElementById('hdrName').textContent = usr.ad;

async function init() {
  if (uid !== 'demo') {
    try {
      const r = await fetch(
        `${SB}/rest/v1/uretim?id=eq.${uid}&select=*`,
        {headers: {'apikey':KEY, 'Authorization':`Bearer ${KEY}`}}
      );
      const d = await r.json();
      if (d && d[0]) {
        urun.adet = d[0].planlanan_adet||0;
        urun.ad = d[0].urun_adi||'Üretim';
        if(d[0].urun_id){
          try{
            const r2=await fetch(`${SB}/rest/v1/urun?id=eq.${d[0].urun_id}&select=ad,sku`,{headers:{'apikey':KEY,'Authorization':`Bearer ${KEY}`}});
            const d2=await r2.json();
            if(d2&&d2[0]){urun.ad=d2[0].ad||urun.ad;urun.sku=d2[0].sku||'—';}
          }catch(e){}
        }
      }
    } catch(e) {}
  }
  document.getElementById('urunAd').textContent = urun.ad;
  document.getElementById('planlanan').textContent = urun.adet;
  document.getElementById('sku').textContent = urun.sku;
}

function tamam(tip) {
  if (tip === 'urun') {
    urunTamam = true;
    document.getElementById('aciktaUrun').readOnly = true;
    const btn = document.getElementById('btnUrun');
    btn.classList.add('done');
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="width:20px;height:20px;"><polyline points="20 6 9 17 4 12"/></svg>Tamam`;
  } else {
    paketTamam = true;
    document.getElementById('aciktaPaket').readOnly = true;
    const btn = document.getElementById('btnPaket');
    btn.classList.add('done');
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="width:20px;height:20px;"><polyline points="20 6 9 17 4 12"/></svg>Tamam`;
  }
}

async function uretimiBitir() {
  const paketAdet = parseInt(document.getElementById('paketAdet').value) || 0;
  const paketGram = parseInt(document.getElementById('paketGram').value) || 0;
  const aciktaUrunGram = parseInt(document.getElementById('aciktaUrun').value) || 0;
  const aciktaPaketAdet = parseInt(document.getElementById('aciktaPaket').value) || 0;
  const not = document.getElementById('notInp').value.trim();

  if (!paketAdet) { alert('Üretilen paket adedini girin!'); return; }
  if (!paketGram) { alert('Bir paketin gramajını girin!'); return; }
  if (!urunTamam) { alert('Açıkta kalan ürün için "Tamam" butonuna basın!'); return; }
  if (!paketTamam) { alert('Açıkta kalan paket için "Tamam" butonuna basın!'); return; }

  // ARKA PLAN HESAPLAMALARI
  const toplamDolumGram = paketAdet * paketGram;
  const toplamDolumKg = toplamDolumGram / 1000;

  // Fire = paket gramajı - açıkta kalan ürün (tam paket dolduramadığımız kısım)
  const fireGram = aciktaUrunGram > 0 ? paketGram - aciktaUrunGram : 0;

  // Gerçek kullanılan ham madde = dolum + fire
  const gercekKullanilanGram = toplamDolumGram + fireGram;
  const gercekKullanilanKg = gercekKullanilanGram / 1000;

  // Gerçek ham madde maliyeti per paket
  const hamMaddePaketGram = paketAdet > 0 ? parseFloat((gercekKullanilanGram / paketAdet).toFixed(1)) : 0;

  // Fire yüzdesi
  const fireYuzde = gercekKullanilanGram > 0
    ? parseFloat(((fireGram / gercekKullanilanGram) * 100).toFixed(1))
    : 0;

  // Plan farkı
  const fark = urun.adet - paketAdet;

  const btn = document.getElementById('btnBitir');
  btn.disabled = true;
  btn.innerHTML = 'Kaydediliyor...';

  if (uid !== 'demo') {
    try {
      // Üretimi tamamlandı yap
      await fetch(`${SB}/rest/v1/uretim?id=eq.${uid}`, {
        method: 'PATCH',
        headers: {'apikey':KEY,'Authorization':`Bearer ${KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},
        body: JSON.stringify({
          durum: 'tamamlandi',
          uretilen_adet: paketAdet,
          toplam_gramaj: toplamDolumKg,
          fire_gramaj: aciktaUrunGram / 1000,
          notlar: [
            `Açıkta kalan ürün: ${aciktaUrunGram} gr`,
            `Açıkta kalan paket: ${aciktaPaketAdet} adet`,
            `Ham madde/paket: ${hamMaddePaketGram} gr`,
            not ? `Not: ${not}` : ''
          ].filter(Boolean).join(' | '),
          bitis_tarihi: new Date().toISOString()
        })
      });

      // Log kaydet
      await fetch(`${SB}/rest/v1/sistem_log`, {
        method: 'POST',
        headers: {'apikey':KEY,'Authorization':`Bearer ${KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},
        body: JSON.stringify({
          kullanici_id: usr.id,
          islem: 'uretim_tamamlandi',
          detay: `${urun.ad}: ${paketAdet}adet×${paketGram}gr=${toplamDolumKg.toFixed(2)}kg. Açık: ${aciktaUrunGram}gr ürün, ${aciktaPaketAdet}adet paket. Ham/paket: ${hamMaddePaketGram}gr`
        })
      });
    } catch(e) { console.error(e); }
  }

  // Başarı özeti
  document.getElementById('basariOzet').innerHTML = `
    <div class="b-oz-satir"><span class="k">Ürün</span><span class="v">${urun.ad}</span></div>
    <div class="b-oz-satir"><span class="k">Üretilen</span><span class="v ok">${paketAdet} adet × ${paketGram} gr</span></div>
    <div class="b-oz-satir"><span class="k">Toplam Dolum</span><span class="v">${toplamDolumKg.toFixed(3)} kg</span></div>
    <div class="b-oz-satir"><span class="k">Açıkta Kalan Ürün</span><span class="v ${aciktaUrunGram > 0 ? 'uyari' : 'ok'}">${aciktaUrunGram > 0 ? aciktaUrunGram + ' gr → stoğa eklendi' : 'Yok 🎉'}</span></div>
    <div class="b-oz-satir"><span class="k">Açıkta Kalan Paket</span><span class="v ${aciktaPaketAdet > 0 ? 'uyari' : 'ok'}">${aciktaPaketAdet > 0 ? aciktaPaketAdet + ' adet → stoğa eklendi' : 'Yok 🎉'}</span></div>
    <div class="b-oz-satir"><span class="k">Gerçek Ham Madde/Paket</span><span class="v ok">${hamMaddePaketGram} gr/paket</span></div>
    <div class="b-oz-satir"><span class="k">Plan Farkı</span><span class="v ${fark === 0 ? 'ok' : 'uyari'}">${fark === 0 ? 'Tam hedef ✅' : fark > 0 ? fark + ' adet eksik' : Math.abs(fark) + ' adet fazla ✨'}</span></div>
    ${not ? `<div class="b-oz-satir"><span class="k">Not</span><span class="v">${not}</span></div>` : ''}
  `;

  document.getElementById('mainWrap').style.display = 'none';
  document.getElementById('basariEkran').classList.add('show');
}

init();
</script>
</body>
</html>
