<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PeaksFood — Giriş</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0f0d;--surface:#111a15;--surface2:#162019;--border:#1e2e23;--accent:#2dff7a;--text:#e8f0ea;--text-muted:#6b8a72;--text-dim:#3d5442;--danger:#ff5555;--font:'Poppins',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;align-items:center;justify-content:center;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:48px 48px;opacity:0.25;pointer-events:none;}
.wrap{position:relative;z-index:1;width:100%;max-width:420px;padding:24px;}
.logo-wrap{text-align:center;margin-bottom:36px;}
.logo-icon{width:64px;height:64px;background:rgba(45,255,122,0.1);border:2px solid rgba(45,255,122,0.3);border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
.logo-icon svg{width:32px;height:32px;color:var(--accent);}
.logo-text{font-size:22px;font-weight:900;color:var(--accent);letter-spacing:1px;}
.logo-sub{font-size:13px;color:var(--text-muted);margin-top:4px;}
.kart{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px;}
.kart-baslik{font-size:20px;font-weight:800;margin-bottom:6px;}
.kart-alt{font-size:13px;color:var(--text-muted);margin-bottom:24px;}
.hata{background:rgba(255,85,85,0.1);border:1px solid rgba(255,85,85,0.2);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--danger);margin-bottom:16px;display:none;}
.alan{margin-bottom:16px;}
.alan label{display:block;font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:7px;}
.inp-wrap{background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:10px;transition:border-color 0.2s;}
.inp-wrap:focus-within{border-color:var(--accent);}
.inp-wrap svg{width:18px;height:18px;color:var(--text-muted);flex-shrink:0;}
.inp-wrap input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:var(--font);font-size:15px;font-weight:500;}
.inp-wrap input::placeholder{color:var(--text-dim);}
.btn-giris{width:100%;padding:16px;border:none;border-radius:12px;background:var(--accent);color:#0a0f0d;font-family:var(--font);font-size:16px;font-weight:800;cursor:pointer;margin-top:8px;transition:all 0.2s;text-transform:uppercase;}
.btn-giris:hover{box-shadow:0 6px 20px rgba(45,255,122,0.3);}
.btn-giris:active{transform:scale(0.98);}
.btn-giris:disabled{opacity:0.5;cursor:not-allowed;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-wrap">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </div>
    <div class="logo-text">PEAKSFOOD</div>
    <div class="logo-sub">Üretim Sistemi — Personel Girişi</div>
  </div>
  <div class="kart">
    <div class="kart-baslik">Hoş geldiniz</div>
    <div class="kart-alt">Sisteme erişmek için bilgilerinizi girin.</div>
    <div class="hata" id="hataMsg"></div>
    <div class="alan">
      <label>Kullanıcı Adı</label>
      <div class="inp-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <input type="text" id="username" placeholder="kullanici.adi" autocomplete="username"/>
      </div>
    </div>
    <div class="alan">
      <label>Şifre</label>
      <div class="inp-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        <input type="password" id="password" placeholder="••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')girisYap()"/>
      </div>
    </div>
    <button class="btn-giris" id="btnGiris" onclick="girisYap()">Giriş Yap</button>
  </div>
</div>
<script>
const SB='https://ubnsszlwyhlmpoukfihw.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVibnNzemx3eWhsbXBvdWtmaWh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NTU4MzAsImV4cCI6MjA5MTMzMTgzMH0.K1kTRAGBlvxx2VKMfagXaZgrbXYaQAbK5UyJwzal4a0';
const H={'apikey':KEY,'Authorization':'Bearer '+KEY};

async function girisYap(){
  const username=document.getElementById('username').value.trim();
  const password=document.getElementById('password').value.trim();
  const hata=document.getElementById('hataMsg');
  const btn=document.getElementById('btnGiris');
  hata.style.display='none';
  if(!username||!password){
    hata.textContent='Kullanıcı adı ve şifre giriniz.';
    hata.style.display='block';
    return;
  }
  btn.disabled=true;
  btn.textContent='Giriş yapılıyor...';
  try{
    const r=await fetch(SB+'/rest/v1/kullanici?aktif=eq.true&select=*',{headers:H});
    const d=await r.json();
    if(!Array.isArray(d)){throw new Error('Sunucu hatası');}
    const user=d.find(x=>x.ad.toLowerCase()===username.toLowerCase()&&x.sifre_hash===password);
    if(!user){
      hata.textContent='Kullanıcı adı veya şifre hatalı.';
      hata.style.display='block';
      btn.disabled=false;
      btn.textContent='Giriş Yap';
      return;
    }
    // Kullanıcı bilgilerini kaydet
    localStorage.setItem('user',JSON.stringify({
      id:user.id,
      ad:user.ad,
      email:user.email||'',
      rol:user.rol
    }));
    // Role göre yönlendir
    if(user.rol==='personel'){
      window.location.href='personel-gorevler.html';
    } else if(user.rol==='yonetici'||user.rol==='superadmin'){
      window.location.href='admin-panel.html';
    } else {
      window.location.href='personel-gorevler.html';
    }
  }catch(e){
    hata.textContent='Bağlantı hatası: '+e.message;
    hata.style.display='block';
    btn.disabled=false;
    btn.textContent='Giriş Yap';
  }
}
</script>
</body>
</html>
