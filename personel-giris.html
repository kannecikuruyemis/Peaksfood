<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PeaksFood — Personel Girişi</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f0d;
    --surface: #111a15;
    --surface2: #162019;
    --border: #1e2e23;
    --accent: #2dff7a;
    --accent-dim: #1a9947;
    --accent-glow: rgba(45,255,122,0.12);
    --text: #e8f0ea;
    --text-muted: #6b8a72;
    --text-dim: #3d5442;
    --danger: #ff4d4d;
    --font-display: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Arka plan grid deseni */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: 0.4;
    pointer-events: none;
  }

  /* Yeşil ışık efekti */
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(45,255,122,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 440px;
    padding: 24px;
    animation: fadeUp 0.6s ease forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Logo / Başlık */
  .logo-area {
    text-align: center;
    margin-bottom: 40px;
  }

  .logo-icon {
    width: 56px;
    height: 56px;
    background: var(--accent-glow);
    border: 1px solid rgba(45,255,122,0.25);
    border-radius: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(45,255,122,0.2); }
    50% { box-shadow: 0 0 0 12px rgba(45,255,122,0); }
  }

  .logo-icon svg {
    width: 28px;
    height: 28px;
    color: var(--accent);
  }

  .logo-title {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  .logo-sub {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
    font-weight: 300;
    letter-spacing: 0.5px;
  }

  /* Kart */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(45,255,122,0.4), transparent);
  }

  .card-title {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 6px;
    color: var(--text);
  }

  .card-desc {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 28px;
    font-weight: 300;
  }

  /* Form */
  .field {
    margin-bottom: 16px;
  }

  .field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 8px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }

  .input-wrap {
    position: relative;
  }

  .input-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    color: var(--text-dim);
    pointer-events: none;
    transition: color 0.2s;
  }

  input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 14px 13px 42px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input::placeholder { color: var(--text-dim); }

  input:focus {
    border-color: rgba(45,255,122,0.4);
    box-shadow: 0 0 0 3px rgba(45,255,122,0.08);
  }

  input:focus + svg,
  .input-wrap:focus-within svg {
    color: var(--accent-dim);
  }

  /* Şifre göster/gizle */
  .eye-btn {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-dim);
    padding: 4px;
    display: flex;
    align-items: center;
    transition: color 0.2s;
  }
  .eye-btn:hover { color: var(--text-muted); }
  .eye-btn svg { width: 16px; height: 16px; }

  /* Hata mesajı */
  .error-msg {
    background: rgba(255,77,77,0.08);
    border: 1px solid rgba(255,77,77,0.2);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: #ff8080;
    margin-bottom: 16px;
    display: none;
    align-items: center;
    gap: 8px;
  }
  .error-msg.show { display: flex; }
  .error-msg svg { width: 14px; height: 14px; flex-shrink: 0; }

  /* Giriş butonu */
  .btn {
    width: 100%;
    background: var(--accent);
    color: #0a0f0d;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
    position: relative;
    overflow: hidden;
    letter-spacing: 0.3px;
  }

  .btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(45,255,122,0.25);
  }

  .btn:active { transform: translateY(0); }

  .btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  /* Loading spinner */
  .btn .spinner {
    display: none;
    width: 18px;
    height: 18px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #0a0f0d;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin: 0 auto;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .btn.loading .btn-text { display: none; }
  .btn.loading .spinner { display: block; }

  /* Alt bilgi */
  .footer-note {
    text-align: center;
    margin-top: 24px;
    font-size: 12px;
    color: var(--text-dim);
  }

  .footer-note span {
    color: var(--accent-dim);
    cursor: pointer;
    font-weight: 500;
  }

  /* Versiyon */
  .version {
    position: fixed;
    bottom: 20px;
    right: 20px;
    font-size: 11px;
    color: var(--text-dim);
    font-family: var(--font-display);
    letter-spacing: 1px;
  }

  /* Köşe dekorasyon */
  .corner-deco {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle at bottom left, rgba(45,255,122,0.04) 0%, transparent 70%);
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="corner-deco"></div>

<div class="container">
  <div class="logo-area">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </div>
    <div class="logo-title">PEAKSFOOD</div>
    <div class="logo-sub">Üretim Sistemi — Personel Girişi</div>
  </div>

  <div class="card">
    <div class="card-title">Hoş geldiniz</div>
    <div class="card-desc">Sisteme erişmek için bilgilerinizi girin.</div>

    <div class="error-msg" id="errorMsg">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="errorText">Kullanıcı adı veya şifre hatalı.</span>
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="field">
        <label>Kullanıcı Adı</label>
        <div class="input-wrap">
          <input type="text" id="username" placeholder="kullanici.adi" autocomplete="username" required/>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
      </div>

      <div class="field">
        <label>Şifre</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required/>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <button type="button" class="eye-btn" onclick="togglePass()" id="eyeBtn">
            <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn" id="loginBtn">
        <span class="btn-text">Giriş Yap</span>
        <div class="spinner"></div>
      </button>
    </form>
  </div>

  <div class="footer-note">
    Şifreni mi unuttun? <span onclick="showForgot()">Yöneticiye başvur</span>
  </div>
</div>

<div class="version">v1.0.0</div>

<script>
  const SUPABASE_URL = 'https://coipnfyqvcoficmghevz.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_2O_WIK7JH8_Jizyarw2MUA_PN7Eeyhi';

  function togglePass() {
    const input = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
    } else {
      input.type = 'password';
      icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    document.getElementById('errorText').textContent = msg;
    el.classList.add('show');
  }

  function hideError() {
    document.getElementById('errorMsg').classList.remove('show');
  }

  async function handleLogin(e) {
    e.preventDefault();
    hideError();

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');

    btn.classList.add('loading');
    btn.disabled = true;

    try {
      // Supabase'den kullanıcıyı sorgula
      const res = await fetch(`${SUPABASE_URL}/rest/v1/kullanici?email=eq.${encodeURIComponent(username)}&aktif=eq.true&select=*`, {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json'
        }
      });

      const data = await res.json();

      if (!data || data.length === 0) {
        showError('Kullanıcı bulunamadı veya hesap aktif değil.');
        return;
      }

      const user = data[0];

      // Şimdilik basit şifre kontrolü (ileride hash ekleyeceğiz)
      if (user.sifre_hash !== password) {
        showError('Kullanıcı adı veya şifre hatalı.');
        return;
      }

      // Rolüne göre yönlendir
      localStorage.setItem('user', JSON.stringify({
        id: user.id,
        ad: user.ad,
        rol: user.rol,
        email: username
      }));

      // Log kaydet
      await fetch(`${SUPABASE_URL}/rest/v1/sistem_log`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({
          kullanici_id: user.id,
          islem: 'giris',
          detay: `${user.ad} sisteme giriş yaptı`
        })
      });

      // Rol bazlı yönlendirme
      if (user.rol === 'personel') {
        window.location.href = 'personel-gorevler.html';
      } else if (user.rol === 'admin') {
        window.location.href = 'admin-dashboard.html';
      } else if (user.rol === 'super_admin') {
        window.location.href = 'superadmin-panel.html';
      }

    } catch (err) {
      showError('Bağlantı hatası. Lütfen tekrar deneyin.');
      console.error(err);
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  function showForgot() {
    showError('Şifre sıfırlama için yöneticinizle iletişime geçin.');
  }

  // Zaten giriş yapmışsa yönlendir
  const existing = localStorage.getItem('user');
  if (existing) {
    try {
      const u = JSON.parse(existing);
      if (u.rol === 'personel') window.location.href = 'personel-gorevler.html';
      else if (u.rol === 'admin') window.location.href = 'admin-dashboard.html';
      else if (u.rol === 'super_admin') window.location.href = 'superadmin-panel.html';
    } catch(e) { localStorage.clear(); }
  }
</script>
</body>
</html>
