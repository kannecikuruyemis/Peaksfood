<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Üretim — PeaksFood</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
--bg:#0a0e0b;--panel:#101712;--panel2:#16201a;--panel3:#1c2820;--bord:rgba(255,255,255,0.07);--bord2:rgba(255,255,255,0.04);
--green:#2ee06a;--green2:#22c55e;--gdim:rgba(46,224,106,0.08);--gmid:rgba(46,224,106,0.16);--gglow:rgba(46,224,106,0.25);
--amber:#f5a623;--adim:rgba(245,166,35,0.09);--amid:rgba(245,166,35,0.18);
--red:#f15a5a;--rdim:rgba(241,90,90,0.09);--rmid:rgba(241,90,90,0.18);
--blue:#4a9eff;--bdim:rgba(74,158,255,0.1);
--purple:#b06cf0;--pdim:rgba(176,108,240,0.1);
--text:#e6f2e9;--dim:#93a89b;--dim2:#5d6f63;
--font:'Plus Jakarta Sans',sans-serif;--mono:'JetBrains Mono',monospace;
--r:12px;--r-sm:9px;--r-lg:16px;
--shadow:0 4px 24px rgba(0,0,0,0.35);--shadow-sm:0 2px 10px rgba(0,0,0,0.25);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased}
.hidden{display:none!important}
/* HEADER */
.top{height:62px;background:linear-gradient(180deg,var(--panel) 0%,rgba(16,23,18,0.96) 100%);border-bottom:1px solid var(--bord);display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:50;backdrop-filter:blur(8px)}
.top .logo{font-weight:800;font-size:17px;color:var(--green);display:flex;align-items:center;gap:8px;letter-spacing:-0.02em}
.top .back{margin-left:auto;color:var(--dim);text-decoration:none;padding:9px 16px;border:1px solid var(--bord);border-radius:var(--r-sm);font-size:13px;font-weight:500;transition:.18s;display:flex;align-items:center;gap:6px}
.top .back:hover{background:var(--panel2);color:var(--text);border-color:var(--gmid)}
.top .user{color:var(--dim);font-size:13px;display:flex;align-items:center;gap:8px}
.top .user b{color:var(--text);font-weight:600}
/* LOGIN */
.lw{position:fixed;inset:0;background:radial-gradient(ellipse at top,#0f1712 0%,var(--bg) 70%);display:flex;align-items:center;justify-content:center;z-index:100}
.lw .card{background:var(--panel);border:1px solid var(--bord);border-radius:var(--r-lg);padding:40px;width:360px;box-shadow:var(--shadow)}
.lw h1{font-size:22px;margin-bottom:6px;color:var(--green);font-weight:800;letter-spacing:-0.02em}
.lw p{color:var(--dim);font-size:13px;margin-bottom:26px}
.lw input{width:100%;padding:13px 15px;background:var(--panel2);border:1px solid var(--bord);border-radius:var(--r-sm);color:var(--text);font-family:var(--font);font-size:14px;margin-bottom:12px;transition:.15s}
.lw input:focus{outline:none;border-color:var(--gmid);box-shadow:0 0 0 3px var(--gdim)}
.lw button{width:100%;padding:13px;background:linear-gradient(135deg,var(--green) 0%,var(--green2) 100%);color:#04210f;border:none;border-radius:var(--r-sm);font-weight:700;font-size:14px;cursor:pointer;font-family:var(--font);transition:.18s;margin-top:4px}
.lw button:hover{filter:brightness(1.08);box-shadow:0 4px 18px var(--gglow)}
.lw .err{color:var(--red);font-size:12px;margin-bottom:12px;min-height:16px}
/* LAYOUT */
.wrap{max-width:1400px;margin:0 auto;padding:32px 24px}
.head{display:flex;align-items:center;gap:14px;margin-bottom:26px;flex-wrap:wrap}
.head h2{font-size:26px;font-weight:800;letter-spacing:-0.03em}
.head .sub{color:var(--dim);font-size:13px}
.head .sp{flex:1}
/* CARDS / STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;margin-bottom:28px}
.stat{background:var(--panel);border:1px solid var(--bord);border-radius:var(--r);padding:20px 22px;transition:.2s;position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--dim2);opacity:.4}
.stat.green::before{background:var(--green)}
.stat.red::before{background:var(--red)}
.stat.amber::before{background:var(--amber)}
.stat.blue::before{background:var(--blue)}
.stat:hover{border-color:var(--bord);transform:translateY(-1px);box-shadow:var(--shadow-sm)}
.stat .lbl{color:var(--dim);font-size:11px;font-weight:600;margin-bottom:10px;text-transform:uppercase;letter-spacing:.6px}
.stat .val{font-size:25px;font-weight:700;font-family:var(--mono);letter-spacing:-0.02em}
.stat.green .val{color:var(--green)}
.stat.red .val{color:var(--red)}
.stat.amber .val{color:var(--amber)}
.stat.blue .val{color:var(--blue)}
/* TOOLBAR */
.tbar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.tbar input,.tbar select{padding:11px 14px;background:var(--panel2);border:1px solid var(--bord);border-radius:var(--r-sm);color:var(--text);font-family:var(--font);font-size:13px;transition:.15s}
.tbar input::placeholder{color:var(--dim2)}
.tbar input:focus,.tbar select:focus{outline:none;border-color:var(--gmid);box-shadow:0 0 0 3px var(--gdim)}
.tbar .search{flex:1;min-width:200px}
.btn{padding:11px 18px;border-radius:var(--r-sm);border:none;font-weight:600;font-size:13px;cursor:pointer;font-family:var(--font);display:inline-flex;align-items:center;gap:6px;transition:.18s}
.btn-g{background:linear-gradient(135deg,var(--green) 0%,var(--green2) 100%);color:#04210f;box-shadow:0 2px 12px var(--gdim)}
.btn-g:hover{filter:brightness(1.08);box-shadow:0 4px 18px var(--gglow);transform:translateY(-1px)}
.btn-o{background:var(--panel2);border:1px solid var(--bord);color:var(--text)}
.btn-o:hover{background:var(--panel3);border-color:var(--gmid)}
.btn-r{background:var(--rdim);color:var(--red);border:1px solid var(--rmid)}
.btn-sm{padding:7px 12px;font-size:12px}
/* TABLE */
.tablewrap{background:var(--panel);border:1px solid var(--bord);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow-sm)}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:14px 18px;font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--bord);background:var(--panel2);white-space:nowrap}
td{padding:15px 18px;border-bottom:1px solid var(--bord2);font-size:13.5px}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--gdim)}
.tag{display:inline-block;padding:4px 11px;border-radius:7px;font-size:11px;font-weight:600;letter-spacing:.2px}
.tag.musteri{background:var(--bdim);color:var(--blue)}
.tag.tedarikci{background:var(--adim);color:var(--amber)}
.tag.her_ikisi{background:var(--pdim);color:var(--purple)}
.bakiye-p{color:var(--green);font-weight:700;font-family:var(--mono)}
.bakiye-n{color:var(--red);font-weight:700;font-family:var(--mono)}
.bakiye-z{color:var(--dim);font-family:var(--mono)}
.row-act{display:flex;gap:7px}
.empty{text-align:center;padding:64px 20px;color:var(--dim2)}
.empty .ic{font-size:48px;margin-bottom:14px;opacity:.35}
.empty .et{font-size:15px;font-weight:600;color:var(--dim);margin-bottom:6px}
.empty .es{font-size:13px;color:var(--dim2)}
/* MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:flex-start;justify-content:center;z-index:90;padding:30px 20px;overflow-y:auto;backdrop-filter:blur(4px)}
.modal .box{background:var(--panel);border:1px solid var(--bord);border-radius:var(--r-lg);width:100%;max-width:680px;margin:auto;box-shadow:var(--shadow)}
.modal .mh{padding:20px 24px;border-bottom:1px solid var(--bord);display:flex;align-items:center;gap:10px}
.modal .mh h3{font-size:18px;font-weight:700;letter-spacing:-0.02em}
.modal .mh .x{margin-left:auto;background:none;border:none;color:var(--dim);font-size:22px;cursor:pointer;line-height:1}
.modal .mb{padding:24px}
.modal .mf{padding:18px 24px;border-top:1px solid var(--bord);display:flex;gap:10px;justify-content:flex-end}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.fld{margin-bottom:16px}
.fld label{display:block;font-size:12px;color:var(--dim);margin-bottom:7px;font-weight:600}
.fld label .req{color:var(--red)}
.fld input,.fld select,.fld textarea{width:100%;padding:11px 14px;background:var(--panel2);border:1px solid var(--bord);border-radius:var(--r-sm);color:var(--text);font-family:var(--font);font-size:13.5px;transition:.15s}
.fld input::placeholder{color:var(--dim2)}
.fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:var(--gmid);box-shadow:0 0 0 3px var(--gdim)}
.fld textarea{resize:vertical;min-height:64px}
.sec-t{font-size:11px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.7px;margin:24px 0 14px;padding-bottom:8px;border-bottom:1px solid var(--bord);display:flex;align-items:center;gap:8px}
.sec-t:first-child{margin-top:0}
/* EKSTRE */
.ekstre-tbl td{font-size:12.5px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--panel);border:1px solid var(--green);border-radius:var(--r);padding:15px 20px;font-size:13px;font-weight:500;z-index:200;box-shadow:var(--shadow);animation:slidein .25s cubic-bezier(.2,.8,.2,1)}
.toast.err{border-color:var(--red)}
@keyframes slidein{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
.loading{text-align:center;padding:48px;color:var(--dim)}
.spin{display:inline-block;width:22px;height:22px;border:2.5px solid var(--bord);border-top-color:var(--green);border-radius:50%;animation:sp 0.7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
@media(max-width:680px){.grid2,.grid3{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}.wrap{padding:20px 16px}}
/* KANAL TABS */
.kanal-tabs{display:flex;gap:7px;margin-bottom:24px;flex-wrap:wrap;background:var(--panel);padding:6px;border-radius:var(--r);border:1px solid var(--bord)}
.ktab{padding:10px 18px;background:transparent;border:none;color:var(--dim);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;border-radius:var(--r-sm);transition:.18s}
.ktab:hover{color:var(--text);background:var(--panel2)}
.ktab.active{color:#04210f;background:linear-gradient(135deg,var(--green) 0%,var(--green2) 100%);box-shadow:0 2px 10px var(--gdim)}
/* MUTABAKAT */
.mut-platform{display:inline-block;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:600;background:var(--pdim);color:var(--purple)}
.dr-bekliyor{background:var(--adim);color:var(--amber);padding:3px 9px;border-radius:6px;font-size:11px;font-weight:600}
.dr-mutabik{background:var(--gdim);color:var(--green);padding:3px 9px;border-radius:6px;font-size:11px;font-weight:600}
.dr-farkli{background:var(--rdim);color:var(--red);padding:3px 9px;border-radius:6px;font-size:11px;font-weight:600}
.dr-odendi{background:var(--bdim);color:var(--blue);padding:3px 9px;border-radius:6px;font-size:11px;font-weight:600}
.fark-p{color:var(--green);font-weight:600;font-family:var(--mono)}
.fark-n{color:var(--red);font-weight:600;font-family:var(--mono)}
</style>
</head>
<body>
<div class="lw" id="lw"><div class="card">
  <h1>🏭 Üretim</h1><p>PeaksFood — devam etmek için giriş yapın</p>
  <div class="err" id="lerr"></div>
  <input id="lad" placeholder="Kullanıcı adı"><input id="lsifre" type="password" placeholder="Şifre">
  <button onclick="login()">Giriş Yap</button>
</div></div>
<div id="app" class="hidden">
  <div class="top"><div class="logo">🏭 PeaksFood</div><a href="admin-panel.html" class="back">← Panele Dön</a><div class="user" id="uad"></div></div>
  <div class="wrap">
    <div class="head"><h2>Üretim Onayları</h2><div class="sub">2 aşamalı · reçeteden maliyet · ÖNCE fiyat → SONRA stok</div><div class="sp"></div>
      <button class="btn btn-g" onclick="loadAll()">🔄 Yenile</button>
    </div>
    <div class="stats" id="stats"></div>
    <div class="al-info" style="background:var(--adim);border:1px solid var(--amid);border-radius:var(--r-sm);padding:11px 14px;font-size:12px;color:var(--amber);margin-bottom:20px">⚠️ Onayda <b>ÖNCE fiyat</b> Sentos'a gönderilir, başarılıysa <b>SONRA stok</b> gönderilir. Fiyat hatalıysa stok durdurulur.</div>
    <div id="onayListesi"><div class="loading"><span class="spin"></span></div></div>
  </div>
</div>
<script>
const SB='https://ubnsszlwyhlmpoukfihw.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVibnNzemx3eWhsbXBvdWtmaWh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NTU4MzAsImV4cCI6MjA5MTMzMTgzMH0.K1kTRAGBlvxx2VKMfagXaZgrbXYaQAbK5UyJwzal4a0';
const H={'apikey':KEY,'Authorization':`Bearer ${KEY}`,'Content-Type':'application/json','Prefer':'return=representation'};
let CU=null;
async function api(path,opts={}){const r=await fetch(`${SB}/rest/v1/${path}`,{...opts,headers:{...H,...(opts.headers||{})}});if(!r.ok){const t=await r.text();throw new Error(t||r.status);}if(r.status===204)return null;const t=await r.text();return t?JSON.parse(t):null;}
async function rpc(fn,params){const r=await fetch(`${SB}/rest/v1/rpc/${fn}`,{method:'POST',headers:H,body:JSON.stringify(params)});if(!r.ok){const t=await r.text();throw new Error(t||r.status);}const t=await r.text();return t?JSON.parse(t):null;}
window.addEventListener('DOMContentLoaded',()=>{try{const s=localStorage.getItem('pf_session');if(s){CU=JSON.parse(s);showApp();}}catch(e){localStorage.removeItem('pf_session');}});
document.getElementById('lsifre')?.addEventListener('keydown',e=>{if(e.key==='Enter')login();});
async function login(){const ad=document.getElementById('lad').value.trim();const sifre=document.getElementById('lsifre').value;const err=document.getElementById('lerr');err.textContent='';if(!ad||!sifre){err.textContent='Kullanıcı adı ve şifre gerekli';return;}try{const res=await rpc('kullanici_giris',{p_ad:ad,p_sifre:sifre});if(!res||!res.length){err.textContent='Kullanıcı adı veya şifre hatalı';return;}CU=res[0];localStorage.setItem('pf_session',JSON.stringify({id:CU.id,ad:CU.ad,rol:CU.rol,email:CU.email||null}));showApp();}catch(e){err.textContent='Giriş hatası: '+e.message;}}
function showApp(){document.getElementById('lw').classList.add('hidden');document.getElementById('app').classList.remove('hidden');document.getElementById('uad').innerHTML=`<b>${CU.ad}</b> · ${CU.rol}`;loadAll();}
function logout(){CU=null;try{localStorage.removeItem('pf_session');}catch(e){}location.reload();}
function closeMo(id){document.getElementById(id).classList.add('hidden');}
function toast(msg,type){const t=document.createElement('div');t.className='toast'+(type==='err'?' err':'');t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000);}
function fmt(n){return (parseFloat(n)||0).toLocaleString('tr-TR',{maximumFractionDigits:2});}
function fmtMoney(n){return (parseFloat(n)||0).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2})+' ₺';}

let uretimler=[], CACHE={usdKur:38.5,eurKur:41.2};
const SENTOS_PROXY='/api/sentos';

async function loadAll(){
  document.getElementById('onayListesi').innerHTML='<div class="loading"><span class="spin"></span></div>';
  try{
    // kur çek
    const kurlar=await api('doviz_kur?select=kod,kur').catch(()=>[]);
    (kurlar||[]).forEach(k=>{if(k.kod==='USD')CACHE.usdKur=parseFloat(k.kur);if(k.kod==='EUR')CACHE.eurKur=parseFloat(k.kur);});
    uretimler=await api('uretim?durum=eq.onay_bekliyor&order=bitis_tarihi.desc')||[];
    renderStats();render();
  }catch(e){document.getElementById('onayListesi').innerHTML=`<div class="empty"><div class="et">Yükleme hatası</div><div class="es">${e.message}</div></div>`;}
}

function renderStats(){
  const toplam=uretimler.length;
  const adet=uretimler.reduce((s,u)=>s+(u.uretilen_adet||u.planlanan_adet||0),0);
  document.getElementById('stats').innerHTML=`
    <div class="stat amber"><div class="lbl">Onay Bekleyen</div><div class="val">${toplam}</div></div>
    <div class="stat green"><div class="lbl">Toplam Adet</div><div class="val">${adet}</div></div>`;
}

function render(){
  const el=document.getElementById('onayListesi');
  if(!uretimler.length){el.innerHTML='<div class="empty"><div class="ic">✅</div><div class="et">Onay bekleyen üretim yok</div><div class="es">Personel üretim bitirince burada görünür</div></div>';return;}
  el.innerHTML=uretimler.map(u=>{
    const planlanan=u.planlanan_adet||0;
    const uretilen=u.uretilen_adet||planlanan;
    const fire=Math.max(0,planlanan-uretilen);
    return `<div class="tablewrap" style="padding:22px;margin-bottom:16px" id="onay_${u.id}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
        <div><div style="font-size:17px;font-weight:800">${u.urun_adi||'—'}</div>
          <div style="font-size:12px;color:var(--dim);margin-top:4px">Lot: <strong>${u.lot_no||'—'}</strong> · Personel: <strong>${u.personel_ad||'—'}</strong></div>
        </div>
        <span class="dr-bekliyor">Onay Bekliyor</span>
      </div>
      <div style="background:var(--panel2);border:1px solid var(--bord);border-radius:var(--r-sm);padding:14px;margin-bottom:14px">
        <div class="sec-t" style="margin:0 0 12px">📦 Stok Onayı</div>
        <div class="grid3">
          <div><div style="font-size:11px;color:var(--dim2)">Planlanan</div><div style="font-weight:700;font-size:18px">${planlanan}</div></div>
          <div><div style="font-size:11px;color:var(--dim2)">Gerçekleşen</div><input type="number" class="fld" id="stok_${u.id}" value="${uretilen}" min="0" style="width:90px;padding:8px;background:var(--panel);border:1px solid var(--bord);border-radius:6px;color:var(--green);font-weight:700;font-size:15px" oninput="fireHesap('${u.id}',${planlanan})"></div>
          <div><div style="font-size:11px;color:var(--dim2)">Fire</div><div id="fire_${u.id}" style="font-weight:700;font-size:18px;color:${fire>0?'var(--red)':'var(--green)'}">${fire>0?'-'+fire:'—'}</div></div>
        </div>
      </div>
      <div id="fiyatlar_${u.id}"><div class="loading" style="padding:16px"><span class="spin"></span> Fiyatlar hesaplanıyor...</div></div>
      <div style="margin-top:14px;display:flex;gap:8px">
        <button class="btn btn-g" onclick="onaylaVeGonder('${u.id}')">✅ Onayla & Gönder (önce fiyat→sonra stok)</button>
        <button class="btn btn-r btn-sm" onclick="geriAl('${u.id}')">✕ Geri Al</button>
      </div>
    </div>`;
  }).join('');
  uretimler.forEach(u=>hesaplaFiyatlar(u));
}

function fireHesap(id,planlanan){
  const g=parseInt(document.getElementById('stok_'+id)?.value)||planlanan;
  const fire=Math.max(0,planlanan-g);
  const el=document.getElementById('fire_'+id);
  if(el){el.textContent=fire>0?'-'+fire:'—';el.style.color=fire>0?'var(--red)':'var(--green)';}
}

async function hesaplaFiyatlar(u){
  const el=document.getElementById('fiyatlar_'+u.id);
  if(!el||!u.urun_id)return;
  try{
    // pazaryeri fiyatları hesapla (her aktif pazaryeri için)
    const pazaryeriler=await api('pazaryeri_ayar?aktif=eq.true&eticaret_tip=eq.b2c&select=pazaryeri').catch(()=>[]);
    const pys=[...new Set((pazaryeriler||[]).map(p=>p.pazaryeri))];
    if(!pys.length){el.innerHTML='<div style="font-size:12px;color:var(--amber)">⚠️ Pazaryeri ayarı yok, fiyat hesaplanamadı. Pazaryeri modülünden ekleyin.</div>';return;}
    let rows='';
    for(const py of pys){
      try{
        const r=await rpc('pazaryeri_fiyat_hesapla',{p_urun_id:u.urun_id,p_pazaryeri:py,p_eticaret_tip:'b2c',p_maliyet:null});
        if(r&&!r.hata){
          rows+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-top:1px solid var(--bord2)">
            <span style="font-weight:600">${py}</span>
            <input type="number" class="fiyat-inp" data-plt="${py}" value="${r.son_fiyat}" step="0.01" style="width:120px;padding:7px 10px;background:var(--panel);border:1px solid var(--bord);border-radius:6px;color:var(--green);font-weight:700;text-align:right;font-family:var(--mono)">
          </div>`;
        }
      }catch(e){}
    }
    el.innerHTML=`<div style="background:var(--panel2);border:1px solid var(--bord);border-radius:var(--r-sm);padding:14px"><div class="sec-t" style="margin:0 0 8px">💰 Pazaryeri Fiyatları (onayla göndermeden kontrol et)</div>${rows||'<div style="color:var(--dim2)">Fiyat hesaplanamadı (reçete/maliyet eksik)</div>'}</div>`;
  }catch(e){el.innerHTML=`<div style="font-size:12px;color:var(--red)">Fiyat hatası: ${e.message}</div>`;}
}

async function onaylaVeGonder(uretimId){
  const kart=document.getElementById('onay_'+uretimId);
  const prices={};
  kart.querySelectorAll('.fiyat-inp').forEach(inp=>{
    const plt=inp.dataset.plt;const f=parseFloat(inp.value)||0;
    if(plt&&f)prices[plt]={list_price:parseFloat((f+0.01).toFixed(2)),sale_price:parseFloat(f.toFixed(2))};
  });
  if(!Object.keys(prices).length){toast('Fiyat bulunamadı','err');return;}
  if(!confirm('Üretim onaylanacak: ÖNCE fiyat, başarılıysa SONRA stok Sentos\'a gönderilecek. Devam?'))return;

  try{
    const urt=await api('uretim?id=eq.'+uretimId+'&select=*');const u=urt?.[0];
    if(!u){toast('Üretim bulunamadı','err');return;}
    const urun=await api('urun?id=eq.'+u.urun_id+'&select=sku,sentos_erp_code,stok_adet');
    const sku=urun?.[0]?.sentos_erp_code||urun?.[0]?.sku;
    if(!sku){toast('Ürün SKU bulunamadı','err');return;}
    const stok=parseInt(document.getElementById('stok_'+uretimId)?.value)||u.planlanan_adet||0;
    const fire=Math.max(0,(u.planlanan_adet||0)-stok);

    // ÖNCE FİYAT, SONRA STOK
    const sonuc=await sentosFiyatSonraStok(sku,prices,stok);
    if(!sonuc.fiyatOk){toast('⚠️ Fiyat gönderilemedi, STOK DURDURULDU: '+sonuc.hata,'err');return;}

    // üretim tamamlandı + stok
    await api('uretim?id=eq.'+uretimId,{method:'PATCH',body:JSON.stringify({durum:'tamamlandi',uretilen_adet:stok,fire_adet:fire})});
    if(u.urun_id&&stok>0){
      const mevcut=parseInt(urun?.[0]?.stok_adet)||0;
      await api('urun?id=eq.'+u.urun_id,{method:'PATCH',body:JSON.stringify({stok_adet:mevcut+stok})}).catch(()=>{});
    }
    toast('✅ Onaylandı! Fiyat→stok Sentos\'a gönderildi');
    kart.style.transition='.3s';kart.style.opacity='0';setTimeout(()=>{kart.remove();loadAll();},300);
  }catch(e){toast('Hata: '+e.message,'err');}
}

// ÖNCE fiyat, başarılıysa SONRA stok
async function sentosFiyatSonraStok(sku,prices,stok){
  const ent=await api('entegrasyon_ayar?platform=eq.sentos&select=*').catch(()=>[]);
  if(!ent?.[0]?.api_key){return{fiyatOk:false,hata:'Sentos API key yok'};}
  const depoId=parseInt(ent[0].depo_id)||1;
  // 1. FİYAT
  let fiyatOk=true,hata='';
  for(const [plt,pf] of Object.entries(prices)){
    try{
      const r=await sentosProxy(`products/${sku}`,'PUT',{prices:{[plt]:{list_price:pf.list_price,sale_price:pf.sale_price}}});
      if(r.status===422){fiyatOk=false;hata=plt+': '+(r.data?.message||'422');break;}
      else if(!r.ok){fiyatOk=false;hata=plt+': HTTP '+r.status;break;}
    }catch(e){fiyatOk=false;hata=e.message;break;}
  }
  if(!fiyatOk)return{fiyatOk:false,hata};
  // 2. STOK (fiyat başarılı olduysa)
  try{
    const r=await sentosProxy(`products/${sku}`,'PUT',{stocks:[{warehouse:depoId,stock:stok}]});
    if(!r.ok&&r.status!==422)return{fiyatOk:true,stokOk:false,hata:'Stok: '+r.status};
  }catch(e){return{fiyatOk:true,stokOk:false,hata:e.message};}
  return{fiyatOk:true,stokOk:true};
}
async function sentosProxy(path,method,body){
  const r=await fetch(SENTOS_PROXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path,method,body})});
  let data={};try{data=await r.json();}catch(e){}
  return{ok:r.ok,status:r.status,data};
}

async function geriAl(uretimId){
  if(!confirm('Üretim onayı geri alınsın mı? Tekrar planlanan durumuna döner.'))return;
  try{await api('uretim?id=eq.'+uretimId,{method:'PATCH',body:JSON.stringify({durum:'planlandi'})});toast('Geri alındı');loadAll();}catch(e){toast('Hata: '+e.message,'err');}
}
